name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify schema.json is in sync with schema.ts and TypeScript compiles
        run: npm run check
      - name: Validate examples against schema.json
        run: npm run validate
      - name: Verify formatting
        run: npm run format:check
